local_llm:
  provider: ollama
  model: qwen3:8b
  base_url: http://localhost:11434

claude:
  model: claude-sonnet-4-6
  token_threshold: 0.99

routing:
  rules:
    - pattern: "find|grep|search|ls|cat|read|explore|where is"
      agent: local
    - pattern: "git log|git diff|git status|git blame"
      agent: local
    - pattern: "refactor|architect|design|generate|write tests"
      agent: claude
  ambiguous_resolver: local
  escalation_threshold: 0.7

context:
  handoff: summary
  max_summary_tokens: 500
  max_file_bytes: 51200

token_tracking:
  enabled: true
  log_file: ~/.locode/usage.log
